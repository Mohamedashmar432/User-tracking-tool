# azure-pipelines.yml
# Deploys the FastAPI backend + dashboard to Azure App Service (Python 3.11).
#
# Required pipeline variables:
#   AZURE_SUBSCRIPTION  – service connection name in Azure DevOps
#   APP_NAME            – Azure App Service name
#   RESOURCE_GROUP      – Azure resource group

trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: '3.11'

stages:

# ── Stage 1: Build ────────────────────────────────────────────────────────────
- stage: Build
  displayName: 'Build'
  jobs:
  - job: BuildJob
    displayName: 'Install & package'
    steps:

    - task: UsePythonVersion@0
      inputs:
        versionSpec: $(pythonVersion)
      displayName: 'Use Python $(pythonVersion)'

    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      displayName: 'Install dependencies'

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
        replaceExistingArchive: true
      displayName: 'Archive app files'

    - publish: $(Build.ArtifactStagingDirectory)/app.zip
      artifact: drop
      displayName: 'Publish artifact'

# ── Stage 2: Deploy ───────────────────────────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy to Azure App Service'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployWeb
    displayName: 'Deploy web app'
    environment: production
    strategy:
      runOnce:
        deploy:
          steps:

          - task: AzureWebApp@1
            displayName: 'Deploy to App Service'
            inputs:
              azureSubscription: '$(AZURE_SUBSCRIPTION)'
              appType: webAppLinux
              appName: '$(APP_NAME)'
              resourceGroupName: '$(RESOURCE_GROUP)'
              package: '$(Pipeline.Workspace)/drop/app.zip'
              runtimeStack: 'PYTHON|3.11'
              startUpCommand: 'python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000'
